name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      SQLITE_PATH: /tmp/scholr-ci.db
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall .

      - name: Run backend tests
        run: python -m pytest tests/ -v

      - name: Backend import check
        run: python -c "import sys; sys.path.insert(0, '.'); from main import app; print('backend import ok')"

      - name: Route smoke check
        run: python -c "import sys; sys.path.insert(0, '.'); from fastapi.testclient import TestClient; from main import app; client = TestClient(app); response = client.get('/health'); assert response.status_code == 200; print(response.json()['status'])"
