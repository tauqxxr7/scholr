name: Repo Hygiene

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check ignored junk is not tracked
        run: |
          git ls-files | grep -E '(^|/)(node_modules|\.next|venv|__pycache__)(/|$)|\.env($|\.|/)|\.db$' && exit 1 || true

      - name: Secret pattern scan
        run: |
          git grep -n -I -E 'AIza[0-9A-Za-z\-_]{20,}|sk-[A-Za-z0-9]{20,}|GEMINI_API_KEY\s*=\s*[^ ]+' -- . ':!backend/.env.example' ':!frontend/.env.example' && exit 1 || true
